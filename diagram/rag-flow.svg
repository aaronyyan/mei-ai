<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 1260">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="42" y="44" fill="#ffffff" font-size="16" font-weight="700">Mei AI 收藏样本 RAG 流程</text>
  <text x="42" y="64" fill="#94a3b8" font-size="9">favorite-only recall · market-scoped retrieval · graceful fallback</text>

  <rect x="330" y="92" width="320" height="56" rx="26" fill="#0f172a"/>
  <rect x="330" y="92" width="320" height="56" rx="26" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="490" y="126" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">开始：用户发来新的医美文案需求</text>

  <rect x="360" y="214" width="260" height="68" rx="8" fill="#0f172a"/>
  <rect x="360" y="214" width="260" height="68" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="490" y="242" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">提取最新用户问题</text>
  <text x="490" y="261" fill="#94a3b8" font-size="9" text-anchor="middle">从 UIMessage[] 中取最后一条 user 文本</text>

  <rect x="360" y="338" width="260" height="68" rx="8" fill="#0f172a"/>
  <rect x="360" y="338" width="260" height="68" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="490" y="366" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">自动判断市场</text>
  <text x="490" y="385" fill="#94a3b8" font-size="9" text-anchor="middle">CN 默认，命中香港语境关键词则切到 HK</text>

  <rect x="360" y="462" width="260" height="68" rx="8" fill="#0f172a"/>
  <rect x="360" y="462" width="260" height="68" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="490" y="490" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">生成本地查询向量</text>
  <text x="490" y="509" fill="#94a3b8" font-size="9" text-anchor="middle">deterministic embedding，256 维</text>

  <g transform="translate(490, 628)">
    <polygon points="0,-40 96,0 0,40 -96,0" fill="#0f172a"/>
    <polygon points="0,-40 96,0 0,40 -96,0" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
    <text y="-6" fill="#ffffff" font-size="10" font-weight="600" text-anchor="middle">收藏样本 RPC</text>
    <text y="14" fill="#ffffff" font-size="10" font-weight="600" text-anchor="middle">调用成功吗？</text>
  </g>

  <rect x="360" y="760" width="260" height="68" rx="8" fill="#0f172a"/>
  <rect x="360" y="760" width="260" height="68" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="490" y="788" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">拼装 system prompt</text>
  <text x="490" y="807" fill="#94a3b8" font-size="9" text-anchor="middle">base prompt + mode note + platform style + RAG context</text>

  <rect x="360" y="884" width="260" height="68" rx="8" fill="#0f172a"/>
  <rect x="360" y="884" width="260" height="68" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="490" y="912" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">streamText 输出回答</text>
  <text x="490" y="931" fill="#94a3b8" font-size="9" text-anchor="middle">客户端边收边显示，正文链路不中断</text>

  <rect x="360" y="1008" width="260" height="68" rx="8" fill="#0f172a"/>
  <rect x="360" y="1008" width="260" height="68" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="490" y="1036" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">onFinish 写回 chat_memories</text>
  <text x="490" y="1055" fill="#94a3b8" font-size="9" text-anchor="middle">保存本轮问答，等待后续被标记为 favorite</text>

  <rect x="330" y="1136" width="320" height="56" rx="26" fill="#0f172a"/>
  <rect x="330" y="1136" width="320" height="56" rx="26" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="490" y="1170" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">结束：返回带样本风格痕迹的最终文案</text>

  <rect x="690" y="590" width="220" height="82" rx="8" fill="#0f172a"/>
  <rect x="690" y="590" width="220" height="82" rx="8" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="800" y="620" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">降级分支</text>
  <text x="800" y="640" fill="#94a3b8" font-size="9" text-anchor="middle">RPC 失败时不阻塞回答</text>
  <text x="800" y="658" fill="#94a3b8" font-size="9" text-anchor="middle">直接使用无 RAG 的 prompt 继续生成</text>

  <rect x="46" y="582" width="230" height="96" rx="8" fill="#0f172a"/>
  <rect x="46" y="582" width="230" height="96" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="161" y="612" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">match_favorite_chat_memories</text>
  <text x="161" y="632" fill="#94a3b8" font-size="9" text-anchor="middle">只查 favorite 样本</text>
  <text x="161" y="650" fill="#94a3b8" font-size="9" text-anchor="middle">按 region 做过滤</text>
  <text x="161" y="668" fill="#94a3b8" font-size="9" text-anchor="middle">默认召回 Top 4</text>

  <line x1="490" y1="148" x2="490" y2="214" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="490" y1="282" x2="490" y2="338" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="490" y1="406" x2="490" y2="462" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="490" y1="530" x2="490" y2="588" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="490" y1="668" x2="490" y2="760" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="490" y1="828" x2="490" y2="884" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="490" y1="952" x2="490" y2="1008" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="490" y1="1076" x2="490" y2="1136" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <path d="M394 628 L276 628" fill="none" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="326" y="618" fill="#a78bfa" font-size="8" text-anchor="middle">query_embedding + match_region</text>

  <path d="M276 646 L394 780" fill="none" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="304" y="724" fill="#a78bfa" font-size="8" text-anchor="middle">参考样本</text>

  <path d="M586 628 L690 628" fill="none" stroke="#fb7185" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="636" y="616" fill="#fb7185" font-size="8" text-anchor="middle">No</text>

  <path d="M800 672 L800 794 L620 794" fill="none" stroke="#fb7185" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="735" y="782" fill="#fb7185" font-size="8" text-anchor="middle">无 RAG 继续</text>

  <text x="505" y="718" fill="#34d399" font-size="8">Yes</text>
</svg>
